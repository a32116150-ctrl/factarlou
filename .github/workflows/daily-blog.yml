name: Daily AI Blog Writer

on:
  schedule:
    - cron: '0 9 * * *' # Runs every day at 9:00 AM UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install @google/generative-ai groq-sdk fs-extra luxon
        
      - name: Generate Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/generate-post.js
        
      - name: Regenerate RSS Feed
        run: node scripts/generate-rss.js
        
      - name: Regenerate Sitemap
        run: node scripts/auto-sitemap.js
        
      - name: Regenerate Search Index
        run: node scripts/generate-search-index.js || echo "No search index script yet"
        
      - name: Post to Social Media
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_URN: ${{ secrets.LINKEDIN_URN }}
        run: node scripts/auto-social.js || echo "Social posting skipped (no API keys)"
        
      - name: Submit to IndexNow (Bing)
        run: |
          curl -s "https://www.bing.com/indexnow?url=https://factarlou.online/sitemap.xml&key=4a7c9d2e1f3b8a5c6d0e9f7a2b4c8d0e"
        
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --cached --quiet || git commit -m "Auto-generated blog post [skip ci]"
          git push
