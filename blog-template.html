<!DOCTYPE html>
<html lang="fr-TN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} — Blog Factarlou</title>
    <base href="/">
    <meta name="description" content="{{EXCERPT}}">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo-icon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="main.js" defer></script>
    <style>
        /* CRITICAL THEME INJECTION (Prevents white background if CSS fails) */
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #0097a7;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(0, 151, 167, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 188, 212, 0.1) 0%, transparent 50%);
            z-index: -1;
        }
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-sizing: border-box;
        }
        nav .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.5rem;
            color: white;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }
        
        .post-container {
            max-width: 850px;
            margin: 140px auto 80px;
            padding: 3rem;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            backdrop-filter: blur(20px);
        }
        .post-header h1 { font-size: 2.5rem; margin: 1rem 0; }
        .post-content { line-height: 1.8; color: var(--text-secondary); font-size: 1.15rem; }
        .post-content h2 { color: white; margin-top: 3rem; }
        .post-cover { width: 100%; height: 450px; object-fit: cover; border-radius: 24px; margin-bottom: 3rem; }
        .lang-toggle { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .btn-lang { padding: 0.6rem 1.5rem; border-radius: 100px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; cursor: pointer; }
        .btn-lang.active { background: var(--primary); border-color: var(--primary); }
        .badge { background: rgba(0, 151, 167, 0.2); color: var(--primary); padding: 0.5rem 1rem; border-radius: 100px; font-size: 0.9rem; font-weight: 600; }
        [lang="ar"] { direction: rtl; display: none; }
        
        footer { padding: 4rem 5%; background: #070b14; text-align: center; border-top: 1px solid var(--glass-border); }
        .footer-links { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; }
        .footer-links a { color: var(--text-secondary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <nav>
        <a href="index.html" class="logo">
            <img src="logo-icon.png" alt="Factarlou" style="width: 40px; height: 40px; border-radius: 10px;">
            Factarlou
        </a>
        <div class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="docs.html">Docs</a>
            <a href="about.html">À Propos</a>
            <a href="showcase.html">Galerie</a>
            <a href="blog.html">Blog</a>
        </div>
        <button class="search-trigger" id="search-btn" style="background: none; border: none; color: white; cursor: pointer;">
            <i data-lucide="search"></i>
        </button>
    </nav>

    <article class="post-container">
        <img src="{{COVER_IMAGE}}" alt="{{TITLE}}" class="post-cover">
        
        <div class="lang-toggle">
            <button class="btn-lang active" onclick="setLang('fr')">Français</button>
            <button class="btn-lang" onclick="setLang('ar')">العربية</button>
        </div>

        <div id="content-fr" lang="fr">
            <header class="post-header">
                <span class="badge">{{CATEGORY}}</span>
                <h1>{{TITLE_FR}}</h1>
                <div style="opacity: 0.6;">{{DATE}}</div>
            </header>
            <div class="post-content">
                {{CONTENT_FR}}
            </div>
        </div>

        <div id="content-ar" lang="ar">
            <header class="post-header">
                <span class="badge">{{CATEGORY_AR}}</span>
                <h1>{{TITLE_AR}}</h1>
                <div style="opacity: 0.6;">{{DATE}}</div>
            </header>
            <div class="post-content">
                {{CONTENT_AR}}
            </div>
        </div>
    </article>

    <footer>
        <div class="footer-links">
            <a href="index.html">Accueil</a>
            <a href="docs.html">Docs</a>
            <a href="about.html">À Propos</a>
            <a href="blog.html">Blog</a>
        </div>
        <p style="color: var(--text-secondary)">&copy; 2026 Factarlou. Fait avec ❤️ pour la Tunisie.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
        function setLang(lang) {
            document.querySelectorAll('.btn-lang').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (lang === 'ar') {
                document.getElementById('content-fr').style.display = 'none';
                document.getElementById('content-ar').style.display = 'block';
            } else {
                document.getElementById('content-fr').style.display = 'block';
                document.getElementById('content-ar').style.display = 'none';
            }
        }
    </script>
</body>
</html>
